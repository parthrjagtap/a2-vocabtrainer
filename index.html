<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vokabeltrainer A2</title>
<style>
  :root{
    --bg:#11151c;
    --panel:#1b212c;
    --panel-2:#222a37;
    --flap:#f0e6d2;
    --flap-shadow:#0a0d12;
    --amber:#e8a33d;
    --red:#d8482f;
    --text:#f0e6d2;
    --muted:#8a93a8;
    --success:#4caf7d;
    --line:#2c3645;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    min-height:100vh;
  }
  .display{
    font-family:"Bahnschrift","Arial Narrow",Impact,sans-serif;
    font-weight:700;
    letter-spacing:0.5px;
    text-transform:uppercase;
  }
  .mono{
    font-family:ui-monospace,"SF Mono",Consolas,monospace;
  }
  header{
    padding:18px 16px 14px;
    border-bottom:3px solid var(--amber);
    background:linear-gradient(180deg,#161b24,#11151c);
    position:sticky; top:0; z-index:10;
  }
  header .row{display:flex; align-items:center; justify-content:space-between; gap:8px;}
  header h1{
    font-size:1.15rem; margin:0;
    color:var(--flap);
  }
  header .sub{color:var(--muted); font-size:0.72rem; margin-top:2px;}
  .backbtn{
    background:none; border:1px solid var(--line); color:var(--muted);
    border-radius:6px; padding:6px 10px; font-size:0.78rem; cursor:pointer;
  }
  .backbtn:active{background:var(--panel-2);}
  main{padding:14px 14px 80px; max-width:640px; margin:0 auto;}

  /* deck list */
  .deck-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-left:5px solid var(--amber);
    border-radius:10px;
    padding:14px 14px;
    margin-bottom:10px;
    cursor:pointer;
    display:flex; justify-content:space-between; align-items:center;
    gap:10px;
  }
  .deck-card:active{background:var(--panel-2);}
  .deck-card .name{font-size:1rem; font-weight:600;}
  .deck-card .meta{color:var(--muted); font-size:0.75rem; margin-top:4px;}
  .deck-card .stat{text-align:right;}
  .deck-card .due{color:var(--red); font-weight:700; font-family:ui-monospace,monospace; font-size:1.1rem;}
  .deck-card .duelabel{color:var(--muted); font-size:0.68rem;}
  .progress-bar{height:5px; background:var(--line); border-radius:3px; margin-top:8px; overflow:hidden;}
  .progress-fill{height:100%; background:var(--success);}

  /* tabs */
  .tabs{display:flex; gap:8px; margin-bottom:14px;}
  .tab{
    flex:1; text-align:center; padding:9px 0; border-radius:8px;
    border:1px solid var(--line); color:var(--muted); cursor:pointer; font-size:0.85rem;
  }
  .tab.active{background:var(--amber); color:#1a1206; border-color:var(--amber); font-weight:700;}

  /* browse list */
  .word-row{
    display:flex; justify-content:space-between; gap:10px;
    padding:10px 4px; border-bottom:1px solid var(--line);
  }
  .word-row .de{font-weight:600;}
  .word-row .type{color:var(--amber); font-size:0.68rem; text-transform:uppercase; margin-left:6px;}
  .word-row .en{color:var(--muted); text-align:right; max-width:48%; font-size:0.88rem;}
  .ex{color:var(--muted); font-size:0.75rem; font-style:italic; margin-top:2px;}

  /* flashcard */
  .session-bar{
    display:flex; justify-content:space-between; align-items:center;
    margin-bottom:14px; color:var(--muted); font-size:0.8rem;
  }
  .session-progress{flex:1; height:4px; background:var(--line); border-radius:2px; margin:0 10px; overflow:hidden;}
  .session-progress-fill{height:100%; background:var(--amber);}

  .flip-scene{ perspective:1400px; margin:0 auto 18px; max-width:480px; }
  .flip-card{
    position:relative; width:100%; min-height:230px;
    transform-style:preserve-3d;
    transition:transform 0.5s cubic-bezier(.4,.2,.2,1);
    cursor:pointer;
  }
  .flip-card.flipped{transform:rotateY(180deg);}
  .face{
    position:absolute; inset:0;
    background:var(--flap);
    color:#1a1206;
    border-radius:12px;
    backface-visibility:hidden;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:26px 20px;
    box-shadow:0 10px 0 var(--flap-shadow), 0 14px 24px rgba(0,0,0,0.4);
  }
  .face::before{
    content:""; position:absolute; left:0; right:0; top:50%;
    height:1px; background:rgba(0,0,0,0.18);
  }
  .face .tag{
    position:absolute; top:12px; left:16px;
    font-size:0.65rem; color:var(--red); font-weight:700; text-transform:uppercase;
    letter-spacing:1px;
  }
  .face .box-indicator{
    position:absolute; top:12px; right:16px;
    font-size:0.65rem; color:#8a7a4d; font-family:ui-monospace,monospace;
  }
  .face .main-word{
    font-size:1.9rem; font-weight:800; text-align:center; line-height:1.2;
    font-family:"Bahnschrift","Arial Narrow",sans-serif;
  }
  .back-face{transform:rotateY(180deg); background:#1b212c; color:var(--flap);}
  .back-face .main-word{font-size:1.5rem; color:var(--amber);}
  .back-face .example{
    margin-top:14px; font-size:0.85rem; color:var(--muted); font-style:italic; text-align:center; max-width:380px;
  }
  .hint{text-align:center; color:var(--muted); font-size:0.75rem; margin-bottom:16px;}

  .answer-buttons{display:flex; gap:10px;}
  .ans-btn{
    flex:1; padding:14px 0; border-radius:10px; border:none; font-weight:700; font-size:0.9rem; cursor:pointer;
  }
  .ans-again{background:#3a2530; color:#f0a3a3;}
  .ans-again:active{background:#4a2e3c;}
  .ans-good{background:var(--success); color:#0c2418;}
  .ans-good:active{background:#3f9968;}

  .empty-state{
    text-align:center; padding:50px 20px; color:var(--muted);
  }
  .empty-state .big{font-size:2.2rem; margin-bottom:8px;}

  .summary{
    text-align:center; padding:40px 20px;
  }
  .summary .num{font-size:3rem; font-family:ui-monospace,monospace; color:var(--success);}
  .summary p{color:var(--muted);}
  .primary-btn{
    background:var(--amber); color:#1a1206; border:none; border-radius:10px;
    padding:12px 24px; font-weight:700; cursor:pointer; font-size:0.9rem; margin-top:16px;
  }

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:3px;}
</style>
</head>

WORDS.forEach((w,i)=>w.id = "w"+i);

/* =========================================================
   STATE & STORAGE
   ========================================================= */
let progress = {}; // id -> {box, due}
let currentDeck = null;
let session = [];
let sessionIdx = 0;
let sessionStats = {known:0, again:0};
let flipped = false;

const STORE_KEY = "a2-progress";

async function loadProgress(){
  try{
    const r = await window.storage.get(STORE_KEY);
    progress = r ? JSON.parse(r.value) : {};
  }catch(e){ progress = {}; }
}
async function saveProgress(){
  try{ await window.storage.set(STORE_KEY, JSON.stringify(progress)); }catch(e){}
}

function getBox(id){ return (progress[id] && progress[id].box) || 0; }
function isDue(id){
  const p = progress[id];
  if(!p) return true; // never studied = due
  return Date.now() >= p.due;
}
const INTERVALS = [0, 1, 2, 4, 7, 14]; // days per box 0..5

function markAnswer(id, correct){
  let p = progress[id] || {box:0, due:0};
  if(correct){ p.box = Math.min(p.box+1, 5); }
  else{ p.box = 0; }
  p.due = Date.now() + INTERVALS[p.box]*24*60*60*1000;
  progress[id] = p;
  saveProgress();
}

function deckList(){
  const decks = {};
  WORDS.forEach(w=>{
    decks[w.deck] = decks[w.deck] || [];
    decks[w.deck].push(w);
  });
  return decks;
}

/* =========================================================
   RENDERING
   ========================================================= */
const main = document.getElementById('main');
const headerTitle = document.getElementById('headerTitle');
const headerSub = document.getElementById('headerSub');
const backBtn = document.getElementById('backBtn');

backBtn.onclick = ()=>renderHome();

function renderHome(){
  currentDeck = null;
  headerTitle.textContent = "VOKABELTRAINER A2";
  headerSub.textContent = "Goethe-Zertifikat · Wortliste";
  backBtn.style.display = "none";
  const decks = deckList();
  let html = `<div class="sub" style="margin-bottom:14px;color:var(--muted);font-size:0.8rem;line-height:1.5;">${WORDS.length} Wörter · komplette Goethe-A2-Liste geladen<br>Ein Wort gilt erst als <b style="color:var(--success)">gemeistert</b>, wenn du es <b>4×</b> in Folge richtig hattest — „in Arbeit" heißt: du bist dran, aber noch nicht sicher.</div>`;
  Object.keys(decks).forEach(name=>{
    const words = decks[name];
    let mastered=0, learning=0, fresh=0;
    words.forEach(w=>{
      const p = progress[w.id];
      if(!p){ fresh++; }
      else if(p.box>=4){ mastered++; }
      else{ learning++; }
    });
    const due = words.filter(w=>isDue(w.id)).length;
    const pct = Math.round(((mastered + learning*0.4)/words.length)*100);
    html += `
      <div class="deck-card" onclick="openDeck('${escapeHtml(name)}')">
        <div>
          <div class="name">${name}</div>
          <div class="meta">${mastered} gemeistert · ${learning} in Arbeit · ${fresh} neu</div>
          <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        </div>
        <div class="stat">
          <div class="due">${due}</div>
          <div class="duelabel">fällig</div>
        </div>
      </div>`;
  });
  main.innerHTML = html;
}

function escapeHtml(s){ return s.replace(/'/g,"\\'"); }

let browseMode = false;

function openDeck(name){
  currentDeck = name;
  browseMode = false;
  headerTitle.textContent = name.toUpperCase();
  headerSub.textContent = "";
  backBtn.style.display = "inline-block";
  renderDeckTabs();
}

function renderDeckTabs(){
  const words = deckList()[currentDeck];
  let html = `
    <div class="tabs">
      <div class="tab ${browseMode?'active':''}" onclick="setMode(true)">📖 Durchsehen</div>
      <div class="tab ${!browseMode?'active':''}" onclick="setMode(false)">🎴 Karteikarten</div>
    </div>
    <div id="deckContent"></div>
  `;
  main.innerHTML = html;
  if(browseMode) renderBrowse(words); else renderSessionStart(words);
}

function setMode(b){ browseMode=b; renderDeckTabs(); }

function renderBrowse(words){
  let html = "";
  words.forEach(w=>{
    html += `
      <div class="word-row">
        <div style="flex:1;">
          <span class="de">${w.de}</span><span class="type">${w.type}</span>
          ${w.ex?`<div class="ex">${w.ex}</div>`:""}
        </div>
        <div class="en">${w.en}</div>
      </div>`;
  });
  document.getElementById('deckContent').innerHTML = html;
}

function renderSessionStart(words){
  const due = words.filter(w=>isDue(w.id));
  const pool = due.length>0 ? due : words;
  document.getElementById('deckContent').innerHTML = `
    <div class="empty-state">
      <div class="big">🎴</div>
      <p>${due.length>0 ? due.length+" Karten sind heute fällig." : "Alles wiederholt! Übe die ganze Liste noch mal."}</p>
      <button class="primary-btn" onclick="startSession()">Start</button>
    </div>`;
  window._pool = pool;
}

function startSession(){
  session = shuffle([...window._pool]);
  sessionIdx = 0;
  sessionStats = {known:0, again:0};
  renderCard();
}

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  return arr;
}

function renderCard(){
  if(sessionIdx >= session.length){
    renderSummary();
    return;
  }
  flipped = false;
  const w = session[sessionIdx];
  const pct = Math.round((sessionIdx/session.length)*100);
  document.getElementById('deckContent').innerHTML = `
    <div class="session-bar">
      <span>${sessionIdx+1} / ${session.length}</span>
      <div class="session-progress"><div class="session-progress-fill" style="width:${pct}%"></div></div>
      <span>✓ ${sessionStats.known}</span>
    </div>
    <div class="flip-scene">
      <div class="flip-card" id="flipCard" onclick="flipCard()">
        <div class="face front-face">
          <div class="tag">${w.type}</div>
          <div class="box-indicator">BOX ${getBox(w.id)}</div>
          <div class="main-word">${w.de}</div>
        </div>
        <div class="face back-face">
          <div class="main-word">${w.en}</div>
          ${w.ex?`<div class="example">„${w.ex}“</div>`:""}
        </div>
      </div>
    </div>
    <div class="hint">Tippe auf die Karte zum Umdrehen</div>
    <div class="answer-buttons" id="answerButtons" style="visibility:hidden;">
      <button class="ans-btn ans-again" onclick="answer(false)">✗ Nochmal</button>
      <button class="ans-btn ans-good" onclick="answer(true)">✓ Kenn ich</button>
    </div>
  `;
}

function flipCard(){
  flipped = !flipped;
  document.getElementById('flipCard').classList.toggle('flipped', flipped);
  if(flipped){
    document.getElementById('answerButtons').style.visibility = 'visible';
  }
}

function answer(correct){
  const w = session[sessionIdx];
  markAnswer(w.id, correct);
  if(correct) sessionStats.known++; else sessionStats.again++;
  sessionIdx++;
  renderCard();
}

function renderSummary(){
  document.getElementById('deckContent').innerHTML = `
    <div class="summary">
      <div class="num mono">${sessionStats.known}/${session.length}</div>
      <p>richtig gewusst</p>
      <button class="primary-btn" onclick="renderDeckTabs()">Fertig</button>
    </div>
  `;
}

/* expose for inline handlers */
window.openDeck = openDeck;
window.setMode = setMode;
window.startSession = startSession;
window.flipCard = flipCard;
window.answer = answer;
window.renderDeckTabs = renderDeckTabs;

/* =========================================================
   INIT
   ========================================================= */
(async function init(){
  await loadProgress();
  renderHome();
})();
</script>
